<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ascent | Toposonic Corpus Explorer</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <h1>ASCENT</h1>
                <span class="version">v1.0.0-web</span>
            </div>
            <div class="transport">
                <button id="load-btn" class="glass-btn primary">LOAD AUDIO</button>
                <input type="file" id="audio-input" accept="audio/*" hidden>
                <div class="divider"></div>
                <button id="play-btn" class="icon-btn" title="Play Engine">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                </button>
                <button id="rec-btn" class="icon-btn rec" title="Record Output">
                    <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="12" r="8" fill="currentColor"/></svg>
                </button>
                <div id="status-indicator" class="idle"></div>
            </div>
        </header>

        <main>
            <div id="explorer-container" class="glass-panel">
                <canvas id="topo-canvas"></canvas>
                <div id="explorer-pin">
                    <div class="pin-inner"></div>
                    <div class="pin-ring"></div>
                </div>
                <div id="loading-overlay" class="hidden">
                    <div class="loader"></div>
                    <p>ANALYZING CORPUS...</p>
                </div>
            </div>

            <aside id="controls" class="glass-panel">
                <div class="tabs">
                    <button class="tab-link active" data-tab="tab-engine">ENGINE</button>
                    <button class="tab-link" data-tab="tab-fx">FX / PRO</button>
                </div>

                <div id="tab-engine" class="tab-content active">
                    <section class="control-group">
                        <h3>GRAIN ENGINE</h3>
                        <div class="control">
                            <label>RATE (Hz)</label>
                            <input type="range" id="grain-rate" min="1" max="100" value="20">
                            <span class="value">20Hz</span>
                        </div>
                        <div class="control">
                            <label>SIZE (ms)</label>
                            <input type="range" id="grain-size" min="10" max="500" value="100">
                            <span class="value">100ms</span>
                        </div>
                        <div class="control">
                            <label>RADIUS</label>
                            <input type="range" id="grain-radius" min="0" max="1" step="0.01" value="0.2">
                            <span class="value">0.2</span>
                        </div>
                    </section>

                    <section class="control-group">
                        <h3>SPATIAL</h3>
                        <div class="control">
                            <label>SPREAD</label>
                            <input type="range" id="grain-spread" min="0" max="1" step="0.01" value="0.5">
                            <span class="value">0.5</span>
                        </div>
                        <div class="control">
                            <label>JITTER</label>
                            <input type="range" id="grain-jitter" min="0" max="1" step="0.01" value="0.1">
                            <span class="value">0.1</span>
                        </div>
                    </section>
                </div>

                <div id="tab-fx" class="tab-content">
                    <section class="control-group">
                        <h3>EFFECTS</h3>
                        <div class="control">
                            <label>REVERB MIX</label>
                            <input type="range" id="fx-reverb" min="0" max="1" step="0.01" value="0.3">
                            <span class="value">0.3</span>
                        </div>
                        <div class="control">
                            <label>DELAY FEEDBACK</label>
                            <input type="range" id="fx-delay" min="0" max="0.9" step="0.01" value="0.4">
                            <span class="value">0.4</span>
                        </div>
                    </section>

                    <section class="control-group">
                        <h3>ENVELOPE</h3>
                        <div class="envelope-select">
                            <button class="env-btn active" data-env="gaussian">GAUSS</button>
                            <button class="env-btn" data-env="triangle">TRI</button>
                            <button class="env-btn" data-env="exp">EXP</button>
                        </div>
                    </section>
                </div>

                <section class="control-group mode-section">
                    <h3>PLAYBACK MODE</h3>
                    <div class="mode-toggle">
                        <button id="mode-point" class="active">POINT</button>
                        <button id="mode-cloud">CLOUD</button>
                    </div>
                </section>

                <div class="visualizer-mini">
                    <canvas id="waveform-canvas"></canvas>
                    <div id="grain-marker"></div>
                </div>
            </aside>
        </main>

        <footer>
            <div class="stats">
                <span>GRAINS: <span id="grain-count">0</span></span>
                <span>LATENCY: <span id="latency-val">~5ms</span></span>
                <span id="rec-status" class="hidden">● RECORDING <span id="rec-time">00:00</span></span>
            </div>
            <div class="credits">
                Istanbul 2026 // Ascent Project
            </div>
        </footer>
    </div>
    <script src="index.js"></script>
</body>
</html>
